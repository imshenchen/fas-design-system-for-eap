name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        # Drop the lockfile to dodge the rollup optional-deps npm bug on Linux
        # (https://github.com/npm/cli/issues/4828). Mirrors deploy-storybook.yml.
        run: rm -f package-lock.json && npm install

      - name: Build package
        run: npm run build --workspace=fas-design-system

      - name: Publish to npm
        run: npm publish --access public
        working-directory: fas-design-system
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
